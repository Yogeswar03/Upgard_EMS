<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration | Upgrad EMS</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="mb-5">
                    <a href="index.html" class="text-decoration-none text-muted small fw-bold">
                        <i class="bi bi-arrow-left me-1"></i> Back to Portal
                    </a>
                </div>

                <!-- Card 1: Summary Top -->
                <div class="card-modern mb-5">
                    <div class="card-header-clean bg-white">
                        <i class="bi bi-info-circle-fill text-primary"></i>
                        <h5 class="mb-0">Selected Event Overview</h5>
                    </div>
                    <div class="card-body p-4 p-xl-5">
                        <div class="d-flex align-items-center justify-content-between mb-4">
                            <div>
                                <h2 id="eventName" class="h3 fw-bold mb-1">-</h2>
                                <span id="eventCategory" class="category-tag">Category</span>
                            </div>
                            <span class="event-id-tag">REF: <span id="eventId">-</span></span>
                        </div>
                        <div class="row g-3 px-xl-3">
                            <div class="col-md-6">
                                <div class="event-info-box d-flex align-items-center gap-3">
                                    <i class="bi bi-calendar3 text-primary h4 mb-0"></i>
                                    <div>
                                        <div class="text-muted x-small text-uppercase fw-bold">Date</div>
                                        <div id="eventDate" class="fw-bold">-</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="event-info-box d-flex align-items-center gap-3">
                                    <i class="bi bi-alarm text-primary h4 mb-0"></i>
                                    <div>
                                        <div class="text-muted x-small text-uppercase fw-bold">Time</div>
                                        <div id="eventTime" class="fw-bold">-</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Card 2: Form Bottom -->
                <div class="card-modern shadow-lg">
                    <div class="card-header-clean bg-white">
                        <i class="bi bi-ticket-perforated-fill text-primary"></i>
                        <h5 class="mb-0">Attendee Information</h5>
                    </div>
                    <div class="card-body p-4 p-xl-5">
                        <form id="registerForm">
                            <div class="row g-4 mb-4">
                                <div class="col-sm-6">
                                    <div class="form-group-modern">
                                        <label class="form-label text-uppercase small fw-bold text-muted">First Name</label>
                                        <input id="fname" class="form-input-modern" placeholder="John" required>
                                    </div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="form-group-modern">
                                        <label class="form-label text-uppercase small fw-bold text-muted">Last Name</label>
                                        <input id="lname" class="form-input-modern" placeholder="Doe" required>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-5">
                                <div class="form-group-modern">
                                    <label class="form-label text-uppercase small fw-bold text-muted">E-mail Discovery</label>
                                    <input type="email" id="email" class="form-input-modern" placeholder="john.doe@corporate.com" required>
                                </div>
                            </div>
                            <button type="submit" class="btn-modern btn-modern-primary w-100 py-4">
                                <i class="bi bi-check2-circle"></i> Complete Secure Registration
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="js/indexedDB.js"></script>
    <script src="js/register.js"></script>
</body>

</html>

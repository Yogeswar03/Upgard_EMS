<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Upgrad EMS</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light py-5">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="mb-5 text-center">
                    <a href="index.html" class="text-decoration-none h3 fw-bold text-dark">
                        <i class="bi bi-rocket-takeoff text-primary me-2"></i>Upgrad EMS
                    </a>
                </div>
                <div class="card border-0 shadow-md">
                    <div class="card-header border-0 py-4 text-center">
                        <h4 class="mb-0 fw-bold w-100"><i class="bi bi-shield-lock me-2"></i>Admin Sign In</h4>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <form id="loginForm">
                            <div class="mb-4">
                                <label class="form-label">Professional Email</label>
                                <input type="email" id="email" class="form-control" placeholder="admin@upgrad.com" required>
                            </div>
                            <div class="mb-5">
                                <label class="form-label">Access Password</label>
                                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                            </div>
                            <button class="btn btn-primary w-100 py-3 shadow-sm">
                                Open Dashboard
                            </button>
                        </form>
                    </div>
                </div>
                <div class="mt-4 text-center">
                    <a href="index.html" class="text-decoration-none text-muted small">
                        <i class="bi bi-arrow-left me-1"></i> Return to Homepage
                    </a>
                </div>
            </div>
        </div>
    </div>


    <script src="js/authentication.js"></script>
</body>

</html>

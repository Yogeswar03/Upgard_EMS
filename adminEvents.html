<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Upgrad EMS</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="dashboard-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar d-none d-lg-block">
            <div class="mb-5">
                <a class="navbar-brand text-white h4 mb-0 d-flex align-items-center gap-2" href="index.html">
                    <i class="bi bi-rocket-takeoff-fill text-primary"></i>
                    Upgrad EMS
                </a>
            </div>

            <nav class="nav flex-column gap-2">
                <div class="sidebar-title">Menu</div>
                <a href="index.html" class="nav-link text-white-50 p-2 d-flex align-items-center gap-2">
                    <i class="bi bi-house-door"></i> Home
                </a>
                <a href="adminEvents.html" class="nav-link text-white p-2 d-flex align-items-center gap-2 active">
                    <i class="bi bi-calendar-event"></i> Manage Events
                </a>
                <button onclick="logout()" class="nav-link text-danger p-2 d-flex align-items-center gap-2 border-0 bg-transparent text-start w-100 mt-4">
                    <i class="bi bi-power"></i> Logout
                </button>
            </nav>
        </aside>

        <!-- Main Dashboard Content -->
        <main class="admin-main">
            <header class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h2 class="h3 mb-1">Administrative Console</h2>
                    <p class="text-muted small mb-0">Overview of all active and upcoming industrial gatherings.</p>
                </div>
                <div class="d-flex gap-2">
                    <span class="badge bg-primary-subtle text-primary px-3 py-2 rounded-pill">
                        <i class="bi bi-hdd-network me-1"></i> Live Database
                    </span>
                </div>
            </header>

            <div class="admin-grid-layout">
                <!-- Creation Form Column -->
                <div class="form-column">
                    <div class="card-modern">
                        <div class="card-header-clean">
                            <i class="bi bi-plus-circle-fill text-primary h4 mb-0"></i>
                            <h5 class="mb-0">Publish New Event</h5>
                        </div>
                        <div class="card-body p-4 p-xl-5">
                            <form id="eventForm">
                                <div class="row g-4">
                                    <div class="col-md-6">
                                        <div class="form-group-modern">
                                            <label class="form-label text-uppercase small fw-bold text-muted">Unique Reference ID</label>
                                            <input id="eventId" class="form-input-modern" placeholder="e.g. TECH-001" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group-modern">
                                            <label class="form-label text-uppercase small fw-bold text-muted">Category Selection</label>
                                            <select id="category" class="form-select form-input-modern">
                                                <option>Tech & Innovations</option>
                                                <option>Industrial Event</option>
                                                <option>Networking</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="form-group-modern">
                                            <label class="form-label text-uppercase small fw-bold text-muted">Full Event Title</label>
                                            <input id="eventName" class="form-input-modern" placeholder="Event Name" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group-modern">
                                            <label class="form-label text-uppercase small fw-bold text-muted">Scheduled Date</label>
                                            <input type="date" id="date" class="form-input-modern" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group-modern">
                                            <label class="form-label text-uppercase small fw-bold text-muted">Start Time</label>
                                            <input type="time" id="time" class="form-input-modern" required>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="form-group-modern">
                                            <label class="form-label text-uppercase small fw-bold text-muted">Destination URL</label>
                                            <input type="url" id="url" class="form-input-modern" placeholder="Registration Link" required>
                                        </div>
                                    </div>
                                    <div class="col-12 mt-4">
                                        <button type="submit" class="btn-modern btn-modern-primary w-100 justify-content-center py-3">
                                            <i class="bi bi-cloud-arrow-up-fill"></i> Commit to Directory
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Event Directory Sidebar -->
                <div class="list-column">
                    <div class="card-modern border-0 bg-transparent shadow-none">
                        <div class="sidebar-title d-flex align-items-center justify-content-between mb-3">
                            <span>Event Directory</span>
                            <i class="bi bi-funnel-fill text-muted"></i>
                        </div>
                        
                        <div class="input-group mb-4 shadow-sm rounded-pill overflow-hidden border">
                            <select id="searchType" class="form-select border-0 bg-white" style="max-width: 80px; font-size: 0.8rem;">
                                <option value="id">ID</option>
                                <option value="name">Name</option>
                            </select>
                            <input id="searchInput" class="form-control border-0 px-3" placeholder="Smart Search...">
                            <button onclick="searchEvent()" class="btn btn-white bg-white border-0">
                                <i class="bi bi-search text-primary"></i>
                            </button>
                        </div>

                        <div id="eventContainer" class="d-flex flex-column gap-3">
                            <!-- Cards injected by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/indexedDB.js"></script>
    <script src="js/events.js"></script>
</body>

</html>

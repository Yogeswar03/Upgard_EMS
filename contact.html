<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support | Upgrad EMS</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="mb-5">
                    <a href="index.html" class="text-decoration-none text-muted small">
                        <i class="bi bi-arrow-left me-1"></i> Back Home
                    </a>
                </div>

                <div class="card border-0 shadow-md">
                    <div class="card-header border-0 bg-white py-4 text-center">
                        <h4 class="mb-0 fw-bold">Contact Support</h4>
                        <p class="text-muted small mb-0 mt-1">Our team typically responds within 24 hours.</p>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <form id="contactForm">
                            <div class="mb-4">
                                <label class="form-label">Full Name</label>
                                <input id="name" class="form-control" placeholder="John Doe" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">Professional Email</label>
                                <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                            </div>

                            <div class="mb-5">
                                <label class="form-label">Inquiry Details</label>
                                <textarea id="message" class="form-control" rows="5" placeholder="How can we help you today?" required></textarea>
                            </div>

                            <button class="btn btn-primary w-100 py-3 shadow-sm">
                                <i class="bi bi-send-fill me-2"></i> Submit Inquiry
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="js/contact.js"></script>
</body>

</html>
